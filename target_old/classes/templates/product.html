<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' | Storefront'">Product Detail</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

    <nav class="navbar">
        <a href="/" class="nav-logo">Storefront</a>
        <div class="nav-links">
            <a href="/" class="nav-link">Catalog</a>
            <a href="/cart" class="nav-link">Cart</a>
        </div>
    </nav>

    <div class="container">
        <div class="checkout-grid" style="grid-template-columns: 1fr 1fr;">
            <div class="product-visual">
                <img th:src="${product.imageUrl}" alt="Product Image"
                    style="width: 100%; border-radius: 1rem; background: #f1f5f9;">
            </div>
            <div class="product-details">
                <div class="product-category" th:text="${product.category}">Category</div>
                <h1 th:text="${product.name}">Product Name</h1>
                <p class="product-price" style="font-size: 2rem; margin-bottom: 2rem;" th:text="${'$' + product.price}">
                    $0.00</p>

                <div style="margin-bottom: 2rem;">
                    <h3>Description</h3>
                    <p class="nav-link" th:text="${product.description}"></p>
                </div>

                <form action="/cart/add" method="post">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <button type="submit" class="btn btn-primary" style="padding: 1rem 2rem; font-size: 1.125rem;">Add
                        to Cart</button>
                </form>

                <a href="/" class="btn btn-outline" style="margin-top: 1rem;">Back to Catalog</a>
            </div>
        </div>
    </div>

</body>

</html>
