<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - All Orders</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

    <nav class="navbar" style="background: #1e293b; color: white; border: none;">
        <a href="/" class="nav-logo" style="color: white;">Storefront Admin</a>
        <div class="nav-links">
            <a href="/" class="nav-link" style="color: #94a3b8;">Frontend</a>
            <a href="/logout" class="btn btn-danger" style="font-size: 0.75rem;">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="header-section" style="margin-bottom: 3rem;">
            <h1>Admin Dashboard</h1>
            <p class="nav-link">Comprehensive view of all customer transactions</p>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Date</th>
                        <th>Total</th>
                        <th>Card Number</th>
                        <th>Expiry</th>
                        <th>CVV</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.id}">1</td>
                        <td th:text="${order.user.username}">user</td>
                        <td th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}">Date</td>
                        <td th:text="${'$' + order.totalAmount}">$0.00</td>
                        <td th:text="${order.creditCardNumber}">CC</td>
                        <td th:text="${order.expiry}">Exp</td>
                        <td th:text="${order.cvv}">CVV</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>

</html>
