<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storefront | Modern E-Commerce</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

    <nav class="navbar">
        <a href="/" class="nav-logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
                <path d="M3 6h18" />
                <path d="M16 10a4 4 0 0 1-8 0" />
            </svg>
            Storefront
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link active">Catalog</a>
            <a href="/cart" class="nav-link">
                Cart <span class="cart-badge" th:text="${session.cart != null ? session.cart.size() : 0}">0</span>
            </a>
            <span th:if="${user != null}" class="nav-links">
                <a href="/orders" class="nav-link">My Orders</a>
                <span th:if="${user.role == 'ADMIN'}">
                    <a href="/admin/orders" class="nav-link">Admin</a>
                </span>
                <a href="/profile" class="btn btn-outline" th:text="${user.name}">Profile</a>
                <a href="/logout" class="nav-link">Logout</a>
            </span>
            <span th:if="${user == null}" class="nav-links">
                <a href="/login" class="nav-link">Login</a>
                <a href="/register" class="btn btn-primary">Sign Up</a>
            </span>
        </div>
    </nav>

    <div class="container">
        <div class="header-section">
            <h1>Discover our Collection</h1>
            <p th:if="${query}" class="nav-link">Search results for: <strong th:text="${query}"></strong></p>
        </div>

        <form action="/" method="get" class="search-container">
            <input type="text" name="query" th:value="${query}" class="search-input"
                placeholder="Search for products, categories...">
            <button type="submit" class="btn btn-primary">Search</button>
        </form>

        <div class="product-grid">
            <div class="product-card" th:each="product : ${products}">
                <img th:src="${product.imageUrl}" alt="Product Image" class="product-image">
                <div class="product-info">
                    <div class="product-category" th:text="${product.category}">Category</div>
                    <h3 class="product-title" th:text="${product.name}">Product Name</h3>
                    <p class="product-price" th:text="${'$' + product.price}">$0.00</p>
                </div>
                <div class="product-actions">
                    <a th:href="@{/product/{id}(id=${product.id})}" class="btn btn-outline">Details</a>
                    <form action="/cart/add" method="post" style="flex-grow: 1;">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <button type="submit" class="btn btn-primary btn-block">Add to Cart</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
