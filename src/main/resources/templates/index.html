<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Storefront</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .nav { margin-bottom: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .product-card { border: 1px solid #ccc; padding: 10px; text-align: center; }
        .product-card img { max-width: 100%; }
        .search-bar { margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="nav">
    <a href="/">Home</a> |
    <a href="/cart">Cart (<span th:text="${session.cart != null ? session.cart.size() : 0}">0</span>)</a> |
    <span th:if="${user != null}">
        Welcome, <a href="/profile" th:text="${user.name}">User</a> |
        <a href="/orders">My Orders</a> |
        <span th:if="${user.role == 'ADMIN'}">
            <a href="/admin/orders">Admin Dashboard</a> |
        </span>
        <a href="/logout">Logout</a>
    </span>
    <span th:if="${user == null}">
        <a href="/login">Login</a> |
        <a href="/register">Register</a>
    </span>
</div>

<h1>Product Catalog</h1>

<div class="search-bar">
    <form action="/" method="get">
        <input type="text" name="query" th:value="${query}" placeholder="Search products...">
        <button type="submit">Search</button>
    </form>
</div>

<div class="product-grid">
    <div class="product-card" th:each="product : ${products}">
        <img th:src="${product.imageUrl}" alt="Product Image">
        <h3 th:text="${product.name}">Product Name</h3>
        <p th:text="${'$' + product.price}">$0.00</p>
        <p th:text="${product.category}">Category</p>
        <a th:href="@{/product/{id}(id=${product.id})}">View Details</a>
        <form action="/cart/add" method="post" style="margin-top: 10px;">
            <input type="hidden" name="productId" th:value="${product.id}">
            <button type="submit">Add to Cart</button>
        </form>
    </div>
</div>

</body>
</html>
