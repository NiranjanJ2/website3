<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="${product.name} + ' - Storefront'">Product</title>
</head>

<body>
    <a href="/">Back to Catalog</a>
    <h1 th:text="${product.name}">Product Name</h1>
    <img th:src="${product.imageUrl}" alt="Product Image">
    <p><strong>Price:</strong> <span th:text="${'$' + product.price}"></span></p>
    <p><strong>Category:</strong> <span th:text="${product.category}"></span></p>
    <p><strong>Description:</strong> <span th:text="${product.description}"></span></p>

    <form action="/cart/add" method="post">
        <input type="hidden" name="productId" th:value="${product.id}">
        <button type="submit">Add to Cart</button>
    </form>
</body>

</html>
