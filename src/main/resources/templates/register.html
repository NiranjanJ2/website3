<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Register - Storefront</title>
</head>

<body>
    <h2>Register</h2>
    <p style="color:red;" th:if="${error}" th:text="${error}"></p>
    <form action="/register" method="post" th:object="${user}">
        <div>
            <label>Username:</label>
            <input type="text" name="username" th:field="*{username}" required>
        </div>
        <div>
            <label>Password:</label>
            <!-- VULNERABILITY: Sent over HTTP -->
            <input type="password" name="password" th:field="*{password}" required>
        </div>
        <div>
            <label>Full Name:</label>
            <input type="text" name="name" th:field="*{name}" required>
        </div>
        <button type="submit">Register</button>
    </form>
    <p>Already have an account? <a href="/login">Login</a></p>
</body>

</html>
