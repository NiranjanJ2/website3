<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Orders - Storefront</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }
    </style>
</head>

<body>
    <a href="/">Back to Home</a>
    <h2>My Orders</h2>

    <div th:if="${orders.isEmpty()}">
        <p>You have no orders yet.</p>
    </div>

    <table th:unless="${orders.isEmpty()}">
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Date</th>
                <th>Status</th>
                <th>Total</th>
                <th>Shipping To</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}"></td>
                <td th:text="${#calendars.format(order.orderDate, 'yyyy-MM-dd HH:mm')}"></td>
                <td th:text="${order.status}"></td>
                <td th:text="${'$' + order.totalAmount}"></td>
                <td th:text="${order.fullName + ', ' + order.address}"></td>
            </tr>
        </tbody>
    </table>
</body>

</html>
