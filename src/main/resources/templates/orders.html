<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Storefront</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

    <nav class="navbar">
        <a href="/" class="nav-logo">Storefront</a>
        <div class="nav-links">
            <a href="/" class="nav-link">Catalog</a>
            <a href="/profile" class="nav-link">Profile</a>
            <a href="/orders" class="nav-link active">Orders</a>
        </div>
    </nav>

    <div class="container">
        <h1>Order History</h1>

        <div th:if="${orders.isEmpty()}" style="text-align: center; padding: 4rem;">
            <p class="nav-link">You haven't placed any orders yet.</p>
        </div>

        <div th:each="order : ${orders}" class="table-container" style="margin-bottom: 2rem;">
            <div
                style="background: #f8fafc; padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <p
                        style="font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--text-light);">
                        Order ID</p>
                    <p style="font-weight: 700;" th:text="'#' + ${order.id}"></p>
                </div>
                <div>
                    <p
                        style="font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--text-light);">
                        Date Placed</p>
                    <p th:text="${#temporals.format(order.orderDate, 'MMM dd, yyyy HH:mm')}"></p>
                </div>
                <div>
                    <p
                        style="font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--text-light);">
                        Status</p>
                    <span class="btn btn-primary"
                        style="padding: 0.25rem 0.75rem; font-size: 0.75rem; border-radius: 999px;"
                        th:text="${order.status}">Status</span>
                </div>
                <div>
                    <p
                        style="font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--text-light);">
                        Total</p>
                    <p style="font-weight: 700; color: var(--primary);" th:text="${'$' + order.totalAmount}"></p>
                </div>
            </div>
            <div style="padding: 1.5rem;">
                <p style="font-weight: 600; margin-bottom: 0.5rem;">Shipping Information</p>
                <p class="nav-link" th:text="${order.fullName}"></p>
                <p class="nav-link" th:text="${order.address}"></p>
            </div>
        </div>
    </div>

</body>

</html>
