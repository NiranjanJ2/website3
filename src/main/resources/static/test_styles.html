<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Preview</title>
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-logo">Storefront Preview</div>
        <div class="nav-links">
            <a href="#" class="nav-link active">Catalog</a>
            <a href="#" class="nav-link">Cart <span class="cart-badge">3</span></a>
            <button class="btn btn-primary">Sign Up</button>
        </div>
    </nav>

    <div class="container">
        <h1>Welcome to the Premium Storefront</h1>
        <p class="nav-link">Testing our new modern design system.</p>

        <div class="search-container">
            <input type="text" class="search-input" placeholder="Search products...">
            <button class="btn btn-primary">Search</button>
        </div>

        <div class="product-grid">
            <div class="product-card">
                <div class="product-image"
                    style="background: #e2e8f0; height: 200px; display: flex; align-items: center; justify-content: center;">
                    [Product Image Placeholder]</div>
                <div class="product-info">
                    <div class="product-category">Electronics</div>
                    <h3 class="product-title">Premium Headphones</h3>
                    <p class="product-price">$299.99</p>
                </div>
                <div class="product-actions">
                    <button class="btn btn-outline">Details</button>
                    <button class="btn btn-primary" style="flex-grow: 1;">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image"
                    style="background: #6366f1; height: 200px; display: flex; align-items: center; justify-content: center; color: white;">
                    Brand Logo</div>
                <div class="product-info">
                    <div class="product-category">Apparel</div>
                    <h3 class="product-title">Designer T-Shirt</h3>
                    <p class="product-price">$45.00</p>
                </div>
                <div class="product-actions">
                    <button class="btn btn-outline">Details</button>
                    <button class="btn btn-primary" style="flex-grow: 1;">Add to Cart</button>
                </div>
            </div>
        </div>

        <div style="margin-top: 4rem;">
            <h2>Typography & UI Elements</h2>
            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button class="btn btn-primary">Primary Button</button>
                <button class="btn btn-outline">Outline Button</button>
                <button class="btn btn-danger">Danger Button</button>
            </div>
        </div>
    </div>
</body>

</html>
